<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
    <title>Eid Mubarak Special Surprise! 🌙</title>
    <style>
        body { margin: 0; padding: 0; overflow-x: hidden; transition: background-color 2s ease; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; }
        
        /* Fixed Footer WhatsApp Button */
        .footerbtn {
            display: block;
            line-height: 50px;
            position: fixed;
            left: 2.5%;
            bottom: 10px;
            height: 60px;
            border-radius: 30px;
            background: #25D366;
            color: #ffffff;
            font-size: 22px;
            text-align: center;
            text-decoration: none;
            width: 95%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 999;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .main-content {
            background: rgba(255,255,255,0.9);
            margin: 15px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            border: 2px solid gold;
        }

        h1 { color: #ff0044; text-shadow: 2px 2px 5px rgba(0,0,0,0.2); font-size: 40px; margin: 10px 0; }
        
        .shayari {
            font-style: italic;
            color: #388e3c;
            font-size: 20px;
            line-height: 1.6;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 5px solid green;
        }

        .ad-banner {
            display: block;
            margin: 15px 0;
            padding: 10px;
            background: #fff;
            border-radius: 10px;
            text-decoration: none;
            color: blue;
            font-weight: bold;
            border: 1px dashed #333;
        }

        .m1, .m2 { position: fixed; top: 0; height: 100%; width: auto; z-index: -1; }
        .m1 { left: 0; } .m2 { right: 0; }
    </style>
</head>
<body>

<marquee class="m1" direction="up" scrollamount="5"><img src="https://bit.ly/3iQGtlP" width="40"></marquee>
<marquee class="m2" direction="down" scrollamount="5"><img src="https://bit.ly/3iQGtlP" width="40"></marquee>

<center>
    <a href="https://www.effectivegatecpm.com/em2yha4k6?key=a98ee7e120ee6fda276897a4f63cbf75" target="_blank" class="ad-banner">
        👉 CLICK HERE TO SEE YOUR EID GIFT 🎁
    </a>

    <div class="main-content">
        <h2 style="color: #006400;">🌙 Eid-ul-Fitr Mubarak 🌙</h2>
        
        <script>
            var name = prompt("Pehle Apna Naam Likhen 👇");
            if (name == null || name == "") name = "Dost";
            document.write("<h1>" + name + "</h1>");
        </script>

        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjeWnXxCJ2pC8FYFK5_RYoZ9XLgNfEohPobbgn3QBgSu0zzkeB-f3VPfm8i1XGRQqA7pyaxGnKvnzu3PuHhML2mBRU5sbh6-9H8FqBZTtrfGoxQ9HrY24u_7jQnDyhSJttkT0NlOmgnRds/s320/eidd.png" width="80%">

        <div class="shayari">
            "Sada haste raho jaise haste hain phool,<br>
            Duniya ki saari gham tum jao bhool,<br>
            Charon taraf phelao khushiyon ka geet,<br>
            Aapko mubarak ho Eid ki preet!"
        </div>

        <a href="https://omg10.com/4/10749356" target="_blank" class="ad-banner" style="border-color: red; color: red;">
            👉 Open Surprise Gift From " + name + " 🎁
        </a>
    </div>

    <p style="font-weight: bold;">By - <script>document.write(name);</script></p>

    <br><br><br><br><br>

    <a class="footerbtn" href="https://omg10.com/4/10749356" target="_blank" onclick="shareIt()">
        <img width="25px" src="https://bit.ly/3xFa8md" style="vertical-align: middle;"/>  
        Share on WhatsApp
    </a>
</center>

<script>
    function shareIt() {
        var catchLine = "👉 *" + name + "* ne aapke liye ek bahut pyara Eid Surprise bheja hai! 🌙🎁\nIse abhi kholen aur apna naam likhen 👇\n";
        var currentUrl = window.location.href;
        
        // 1 second baad WhatsApp open hoga taaki ad pehle load ho jaye
        setTimeout(function() {
            window.location.href = "whatsapp://send?text=" + encodeURIComponent(catchLine + currentUrl);
        }, 1200);
    }

    // Background color animation
    function changeBg() {
        var colors = ["#E3F2FD", "#F1F8E9", "#FFF3E0", "#FCE4EC", "#F3E5F5"];
        var randomColor = colors[Math.floor(Math.random() * colors.length)];
        document.body.style.backgroundColor = randomColor;
    }
    setInterval(changeBg, 3000);
</script>

</body>
</html>
