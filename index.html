<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>》⍟☆⍣ Eid Mubarak 2026 Special ⍣☆⍟《</title>
<style>
/* Modern Gradient Background */
body {
    background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #000000);
    background-size: 400% 400%;
    animation: gradient 15s ease infinite;
    color: white; font-family: sans-serif; text-align: center;
}

@keyframes gradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* WhatsApp Floating Button */
.footerbtn {
    display: block;
    position: fixed;
    left: 5%; bottom: 15px;
    width: 90%; height: 55px;
    line-height: 55px;
    background: #25D366;
    color: white;
    font-size: 20px; font-weight: bold;
    text-decoration: none; border-radius: 50px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    z-index: 9999;
}

/* Timer Circle */
#btnTimer {
    background: rgba(0,0,0,0.3);
    padding: 2px 8px; border-radius: 10px; font-size: 14px; margin-left: 10px;
}

/* Stars Animation */
.star { position: fixed; color: gold; animation: fall linear infinite; pointer-events: none; }
@keyframes fall { to { transform: translateY(100vh); } }

#demo { font-size: 22px; color: #ffd700; margin: 15px 0; }
</style>
</head>
<body onclick="playAudio()">

<audio id="myAudio" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<div id="starContainer"></div>

<h2 style="margin-top:20px;">🌙 EID AL-FITR 2026 🌙</h2>
<div id="demo"></div>

<center>
    <script>
        var a = prompt("Apna Pyara Naam Likhen 👇");
        if (!a) a = "Aapka Dost";
        document.write("<h1 style='font-size:40px; text-shadow: 0 0 10px #ff00de;'>"+a+"</h1>");
    </script>

    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjeWnXxCJ2pC8FYFK5_RYoZ9XLgNfEohPobbgn3QBgSu0zzkeB-f3VPfm8i1XGRQqA7pyaxGnKvnzu3PuHhML2mBRU5sbh6-9H8FqBZTtrfGoxQ9HrY24u_7jQnDyhSJttkT0NlOmgnRds/s320/eidd.png" width="80%">

    <div style="margin: 20px; font-size: 18px; line-height: 1.6;">
        <p>Eid Ka Chand Mubarak Ho!</p>
        <p>Khushiyan Aapke Kadam Choomein.</p>
    </div>

    <div style="min-height:100px;">
        <script type="text/javascript" src="https://omg10.com/4/10749356"></script>
    </div>
</center>

<br><br><br><br>

<a id="shareBtn" class="footerbtn" href="javascript:void(0)" onclick="handleShare()">
   🚀 BHEJEN SABHI KO <span id="btnTimer">500</span>
</a>

<script>
var timeLeft = 500;
var adClicked = false;
var adUrl = "https://www.effectivegatecpm.com/em2yha4k6?key=a98ee7e120ee6fda276897a4f63cbf75";
var whatsappMsg = "whatsapp://send?text= *Eid Mubarak 2026* ✨ " + window.location.href;

// Timer Logic
var timerId = setInterval(function(){
    timeLeft--;
    document.getElementById("btnTimer").innerHTML = timeLeft;
    if(timeLeft <= 0) {
        clearInterval(timerId);
        document.getElementById("btnTimer").style.display = 'none';
    }
}, 1000);

// Smart Share Logic
function handleShare() {
    if(!adClicked) {
        // Step 1: Open Ad in new tab
        window.open(adUrl, '_blank');
        adClicked = true;
        
        // Change button text and icon for trust
        var btn = document.getElementById("shareBtn");
        btn.style.background = "#075E54"; // Darker WhatsApp Green
        btn.innerHTML = "✅ CONFIRM SHARE (SABKO BHEJEN)";
    } else {
        // Step 2: Open WhatsApp
        window.location.href = whatsappMsg;
    }
}

function playAudio() { document.getElementById("myAudio").play(); }

// Star creation
for(var i=0; i<20; i++) {
    var star = document.createElement('div');
    star.className = 'star';
    star.innerHTML = '★';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = '-5%';
    star.style.fontSize = (Math.random() * 20 + 10) + 'px';
    star.style.animationDuration = (Math.random() * 3 + 2) + 's';
    document.getElementById('starContainer').appendChild(star);
}

// Countdown to Eid
var countDownDate = new Date("March 20, 2026 00:00:00").getTime();
setInterval(function() {
    var now = new Date().getTime();
    var distance = countDownDate - now;
    var days = Math.floor(distance / (1000 * 60 * 60 * 24));
    document.getElementById("demo").innerHTML = days + " Din Baaki Hain";
}, 1000);
</script>

</body>
</html>
