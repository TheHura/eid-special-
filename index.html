<!DOCTYPE html>
<html>

    <style>
        body { margin: 0; padding: 0; overflow-x: hidden; transition: background-color 2s ease; font-family: 'Arial', sans-serif; text-align: center; }
        
        /* Fast WhatsApp Button */
        .footerbtn {
            display: block;
            line-height: 55px;
            position: fixed;
            left: 2.5%;
            bottom: 10px;
            height: 60px;
            border-radius: 30px;
            background: #25D366;
            color: #ffffff;
            font-size: 22px;
            text-align: center;
            text-decoration: none;
            width: 95%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);

        .container {

            margin: 10px;
            padding: 20px;
            border-radius: 20px;
            border: 3px solid #ffd700;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);

        .shayari-box {
            font-size: 19px;

            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;

<script>
    function goViral() {
        // WhatsApp Message with Catchy Line
        var text = "🌙 *" + user + "* ने आपके लिए ईद का एक बहुत प्यारा तोहफा भेजा है! 🎁✨\n\nदेखें इसमें आपके लिए क्या खास है? जल्दी क्लिक करें और अपना नाम लिखें! 😍👇\n\n";
        var url = window.location.href;

        window.location.href = "whatsapp://send?text=" + encodeURIComponent(text + url);

        setTimeout(function() {
            window.open("https://omg10.com/4/10749356", "_blank");

    }

    setInterval(function() {
