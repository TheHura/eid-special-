/* Glowing Background Animation */
body {
    background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    overflow-x: hidden;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Stars Animation */
.stars {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: -1;
}

/* WhatsApp Button with your Ad Link */

    width: 95%;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    animation: pulse 1.5s infinite;
    z-index: 1000;
    font-weight: bold;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }

@keyframes glow { from { text-shadow: 0 0 10px #fff, 0 0 20px #ff00de; } to { text-shadow: 0 0 20px #fff, 0 0 30px #00ffff; } }

<script>
// Audio Play Function
function playAudio() {
    var x = document.getElementById("myAudio");
    x.play();
}

// Timer for Eid 2026 (Approx March 20)
var countDownDate = new Date("March 20, 2026 00:00:00").getTime();
var x = setInterval(function() {
    var now = new Date().getTime();
    var distance = countDownDate - now;
    var days = Math.floor(distance / (1000 * 60 * 60 * 24));
    var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    var seconds = Math.floor((distance % (1000 * 60)) / 1000);
    document.getElementById("demo").innerHTML = days + "d " + hours + "h " + minutes + "m " + seconds + "s ";
    if (distance < 0) {
        clearInterval(x);
        document.getElementById("demo").innerHTML = "EID MUBARAK!";
    }
}, 1000);
</script>
